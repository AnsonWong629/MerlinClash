[custom]
; ============================================================
; Ansencen Stash ini - 简化版 (移动端专用)
; 由 ~/Developer/home-network/openclash/generator.py 渲服工作流类似
; 但格式为 ACL4SSR/subconverter 模板 → 走 N100 sub_convert API
; ============================================================
; 设计原则 (2026-07-10):
; 1. 谷歌 + AI → 一个手动分组 (🧠 谷歌&AI)
; 2. 其他要走国外的全部 → 国外网站 (🌐 国外网站)
; 3. 广告只用一个: Matrix7 AdvertisingLite (🛑 广告拦截)
; 4. 漏网之鱼 → 默认走代理 (→ 🌐 国外网站, 即代理)
; ============================================================

; ============ 规则集 (ruleset) ============
; 广告 (Matrix7 AdvertisingLite, 只用这一份)
ruleset=🛑 广告拦截,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/AdvertisingLite/AdvertisingLite_Classical.yaml

; 国内直连 (5 份)
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve
ruleset=🎯 全球直连,clash-classic:https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@release/cn.mrs
ruleset=🎯 全球直连,clash-classic:https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@release/private.mrs

; 谷歌 + AI → 手动分组 (4 份)
ruleset=🧠 谷歌&AI,[]GEOSITE,google
ruleset=🧠 谷歌&AI,[]GEOIP,google,no-resolve
ruleset=🧠 谷歌&AI,clash-classic:https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@release/ai.mrs
ruleset=🧠 谷歌&AI,clash-classic:https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@release/google-cn.mrs

; 国外网站 (其他国外, 5 份)
ruleset=🌐 国外网站,[]GEOSITE,gfw
ruleset=🌐 国外网站,clash-classic:https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@release/gfw.mrs
ruleset=🌐 国外网站,clash-classic:https://cdn.jsdelivr.net/gh/DustinWin/ruleset_geodata@release/tld-proxy.mrs
ruleset=🌐 国外网站,[]GEOSITE,telegram
ruleset=🌐 国外网站,[]GEOSITE,geolocation-!cn

; 兜底 → 漏网之鱼 (最后兜底)
ruleset=🐟 漏网之鱼,[]FINAL

; ============ 节点分组 (proxy groups) ============
; 主节点 (select, 全部)
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]DIRECT`.*

; 自动测速 (url-test, 全部)
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

; 谷歌 + AI (手动, 合并原 🔍 谷歌服务 + 🤖 AI)
custom_proxy_group=🧠 谷歌&AI`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT`.*

; 国外网站 (其他国外流量打包)
custom_proxy_group=🌐 国外网站`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT`.*

; 国内直连
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择`[]♻️ 自动选择

; 广告拦截 (只用 Matrix7 AdvertisingLite)
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT

; 漏网之鱼 (默认走代理 → 国外网站, 不直接连)
custom_proxy_group=🐟 漏网之鱼`select`[]🌐 国外网站`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT
